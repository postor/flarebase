services:
  flare-node-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - NODE_ID=1
      - HTTP_ADDR=0.0.0.0:3000
      - GRPC_ADDR=0.0.0.0:50051
    ports:
      - "3001:3000"
      - "50051:50051"

  flare-node-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
