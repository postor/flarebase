      - NODE_ID=2
      - HTTP_ADDR=0.0.0.0:3000
      - GRPC_ADDR=0.0.0.0:50051
    ports:
      - "3002:3000"
      - "50052:50051"

  flare-node-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
