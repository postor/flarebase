<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Socket.IO 连接测试</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        #output { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>🔍 Flarebase Socket.IO 连接测试</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        const flarebaseUrl = 'http://localhost:3003';

        function addLog(message, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = message;
            output.appendChild(div);
            console.log(message);
        }

        addLog('📍 开始测试 Socket.IO 连接...', 'info');
        addLog('Flarebase URL: ' + flarebaseUrl, 'info');

        const socket = io(flarebaseUrl, {
            transports: ['websocket', 'polling'],
            reconnection: true
        });

        // 监听连接事件
        socket.on('connect', () => {
            addLog('✅ Socket.IO 已连接到 Flarebase!', 'success');
            addLog('Socket ID: ' + socket.id, 'info');

            // 测试白名单查询
            addLog('🔍 发送白名单查询: list_published_posts', 'info');
            socket.emit('named_query', ['list_published_posts', { limit: 10 }]);
        });

        socket.on('query_success', (result) => {
            addLog('✅ 白名单查询成功!', 'success');
            addLog('结果类型: ' + (result.Simple ? 'Simple' : 'Pipeline'), 'info');
        });

        socket.on('query_error', (error) => {
            addLog('❌ 白名单查询失败: ' + JSON.stringify(error), 'error');
        });

        socket.on('connect_error', (error) => {
            addLog('❌ 连接错误: ' + error.message, 'error');
        });

        socket.on('error', (error) => {
            addLog('❌ Socket.IO 错误: ' + error, 'error');
        });

        // 检查页面加载时的错误
        window.addEventListener('error', (event) => {
            addLog('❌ 页面错误: ' + event.message, 'error');
        });

        window.addEventListener('unhandledrejection', (event) => {
            addLog('❌ 未处理的 Promise 错误: ' + event.reason, 'error');
        });

        // 超时检查
        setTimeout(() => {
            addLog('⏱️ 5秒后检查状态...', 'info');
            if (socket.connected) {
                addLog('✅ 连接仍然活跃', 'success');
            } else {
                addLog('❌ 连接已断开或未建立', 'error');
            }
        }, 5000);
    </script>
</body>
</html>
